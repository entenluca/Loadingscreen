# Discord / Spielerprofil – diese Zeilen in deine server.cfg kopieren.
# NIEMALS den Bot-Token in config.js oder andere Dateien im Resource-Ordner eintragen!
# Den Token auch nicht ins Git-Repository committen.
#
# WICHTIG: Bot-Token mit "set" (NICHT "setr") – bleibt nur auf dem Server, Clients sehen ihn nicht.

set loadingscreen:discord_bot_token "HIER_DEIN_DISCORD_BOT_TOKEN"
set loadingscreen:use_lanyard true
