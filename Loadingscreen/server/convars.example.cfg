# Discord / Spielerprofil – in deine server.cfg kopieren.
# Token NIEMALS in config.js oder Git committen – nur "set", nicht "setr"!

set loadingscreen:discord_bot_token "HIER_DEIN_DISCORD_BOT_TOKEN"
set loadingscreen:discord_guild_id "HIER_DEINE_DISCORD_SERVER_ID"
set loadingscreen:use_lanyard true
set loadingscreen:debug true

# --- Discord Online-Status (Lanyard) ---
# Discord-Bot-API liefert KEINEN Live-Status – dafuer braucht es Lanyard.
# Jeder Spieler muss EINMAL dem Lanyard-Discord beitreten:
#   https://discord.gg/UrXF2cfJ7F
# Danach wird der echte Status (Online/Abwesend/DND/Offline) angezeigt.
# Die discord:-ID kommt NUR beim Connect ueber den Discord DESKTOP-Client.
# Sie ist NICHT dasselbe wie "Kontoverknuepfungen" in FiveM allein!
#
# Spieler muessen:
#   1. Discord Desktop oeffnen (nicht Browser, nicht PTB, nicht als Admin)
#   2. FiveM starten -> Discord fragt nach Erlaubnis -> Annehmen
#   3. Pruefen: Discord -> Einstellungen -> Autorisierte Apps -> FiveM
#   4. FiveM -> Einstellungen -> Identitaeten verknuepfen -> Discord
#
# Discord-ID ist nach dem Connect NICHT mehr per Script abrufbar – wird beim
# Connect gecacht. Siehe: forum.cfx.re (GetPlayerIdentifierByType discord null during game)
#
# Bot-Setup (Developer Portal):
#   - Bot zum Discord-Server einladen
#   - "Server Members Intent" aktivieren (fuer Guild-ID Lookup)
#   - Guild-ID: Discord Server -> Rechtsklick -> ID kopieren (Entwicklermodus an)
#
# Test ingame nach Connect: /lsdebug
