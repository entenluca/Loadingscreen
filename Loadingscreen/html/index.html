<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MB Development - LoadingScreen</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="background">
        <video id="bgVideo" autoplay playsinline loop></video>
        <audio id="bgAudio" loop></audio>
        <div id="bgImageA" class="bg-image"></div>
        <div id="bgImageB" class="bg-image"></div>
    </div>

    <div class="shade"></div>
    <div class="vignette"></div>

    <div class="ui-shell">
        <aside class="sidebar sidebar-left" aria-label="Server-Informationen">
            <header class="welcome-block">
                <h2 id="welcomeTitle">WELCOME TO SERVER</h2>
                <p id="welcomeText">Willkommen auf unserem Roleplay-Server.</p>
            </header>

            <div id="rulesWidget" class="widget"></div>
            <div id="updatesWidget" class="widget"></div>
            <div id="galleryWidget" class="widget"></div>
        </aside>

        <section class="stage" aria-label="Ladebereich">
            <nav class="top-nav" aria-label="Schnellaktionen">
                <button type="button" class="nav-btn icon" data-icon="play" aria-label="Abspielen"></button>
                <button type="button" class="nav-btn icon" data-icon="gamepad-2" aria-label="Steuerung"></button>
                <button type="button" class="nav-btn icon" data-icon="settings" aria-label="Einstellungen"></button>
            </nav>

            <h1 class="hero-title" aria-label="Loading Screen">
                <span id="heroLine1" class="hero-line">LOADING</span>
                <span id="heroLine2" class="hero-line">SCREEN</span>
            </h1>

            <div id="videoControls" class="video-controls" role="status" aria-live="polite">
                <span class="video-label">Video</span>
                <span id="soundIcon" class="control-icon icon" aria-hidden="true"></span>
                <span id="soundText" class="video-hint"><b>[LEERTASTE]</b> Musik stoppen</span>
            </div>
        </section>

        <aside class="sidebar sidebar-right" aria-label="Team und Medien">
            <div id="teamWidget" class="widget"></div>
            <div id="musicWidget" class="widget"></div>
            <div id="socialsWidget" class="widget"></div>
        </aside>

        <footer class="load-footer">
            <div class="footer-left">
                <span class="footer-label">Loading...</span>
                <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
            <div class="footer-center">
                <span id="loadingStatus">Ressourcen werden geladen...</span>
            </div>
            <div class="footer-right">
                <span id="progressPercent" class="progress-percent">0%</span>
            </div>
        </footer>
    </div>

    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script src="script.js"></script>
</body>
</html>
